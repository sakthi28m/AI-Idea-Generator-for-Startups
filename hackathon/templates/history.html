<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#06b6d4">
    <title>History | SPARK AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='logo.svg') }}" type="image/svg+xml">
</head>
<body>
<nav class="navbar">
    <div class="logo"><img src="{{ url_for('static', filename='logo.svg') }}" alt="SPARK AI"></div>
    <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">Home</a>
        <a href="#" onclick="history.back(); return false;">Back</a>
        <a href="{{ url_for('favorites_page') }}">Favorites</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>

<main class="dashboard">
    <h2>Search History</h2>
    <div class="cards">
        {% for item in history %}
            <div class="example-card">{{ item.domain }} — {{ item.count }} variations</div>
        {% else %}
            <p>No history yet — generate some ideas to populate this list.</p>
        {% endfor %}
    </div>
</main>
</body>
</html>
